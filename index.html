<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCM Happy Studio</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; background:#111; color:#fff; padding:20px }
button { padding:10px; margin:5px; cursor:pointer }
</style>
</head>

<body>

<h2>MCM Happy Studio</h2>

<button id="exportJsonBtn">Export JSON</button>
<button id="exportIcsBtn">Export Calendar</button>
<button id="gcalBtn">Connect Google</button>

<script>
// SAFE START
window.addEventListener('load', () => {
  try {
    initApp();
  } catch (e) {
    console.error(e);
    alert("Eroare: " + e.message);
  }
});

// INIT
function initApp() {
  initFirebase();
  bindEvents();
}

// FIREBASE
function initFirebase() {
  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_PROJECT"
  };
  firebase.initializeApp(firebaseConfig);
}

// EVENTS
function bindEvents() {
  const jsonBtn = document.getElementById('exportJsonBtn');
  const icsBtn = document.getElementById('exportIcsBtn');
  const gcalBtn = document.getElementById('gcalBtn');

  if (jsonBtn) jsonBtn.addEventListener('click', exportJson);
  if (icsBtn) icsBtn.addEventListener('click', exportIcs);
  if (gcalBtn) gcalBtn.addEventListener('click', connectGoogleCalendar);
}

// DOWNLOAD (MEDIAN SAFE)
function downloadFile(blob, filename) {
  const reader = new FileReader();

  reader.onloadend = function () {
    const dataUrl = reader.result;

    if (navigator.share) {
      fetch(dataUrl)
        .then(res => res.blob())
        .then(fileBlob => {
          const file = new File([fileBlob], filename, { type: blob.type });
          return navigator.share({ files: [file] });
        })
        .catch(() => window.location.href = dataUrl);
    } else {
      window.location.href = dataUrl;
    }
  };

  reader.readAsDataURL(blob);
}

// EXPORT JSON
function exportJson() {
  const data = { test: "backup", date: new Date().toISOString() };

  const blob = new Blob([JSON.stringify(data, null, 2)], {
    type: 'application/json'
  });

  downloadFile(blob, "backup.json");
}

// EXPORT ICS
function exportIcs() {
  const ics = `BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
SUMMARY:MCM Event
END:VEVENT
END:VCALENDAR`;

  const blob = new Blob([ics], { type: 'text/calendar' });
  downloadFile(blob, "calendar.ics");
}

// GOOGLE CALENDAR FIX
function connectGoogleCalendar() {
  window.location.href = "https://mcmhappy-studio.github.io/Booking/?gcal=1";
}
</script>

</body>
</html>
